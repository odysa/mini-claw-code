name: Install mdBook toolchain
description: >
  Fetch the `mdbook`, `mdbook-mermaid`, and `mdbook-quiz` prebuilt linux
  binaries and put them on $PATH. Single source of truth so book-build jobs
  in any workflow stay in sync -- adding a new preprocessor only changes one
  file.

runs:
  using: composite
  steps:
    - name: Fetch prebuilt binaries
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p bin
        MDBOOK_URL=$(gh release view --repo rust-lang/mdBook --json assets --jq '.assets[] | select(.name | test("x86_64-unknown-linux-gnu.tar.gz$")) | .url')
        curl -sSL "$MDBOOK_URL" | tar -xz -C bin
        MERMAID_URL=$(gh release view --repo badboy/mdbook-mermaid --json assets --jq '.assets[] | select(.name | test("x86_64-unknown-linux-gnu.tar.gz$")) | .url')
        curl -sSL "$MERMAID_URL" | tar -xz -C bin
        QUIZ_URL=$(gh release view --repo cognitive-engineering-lab/mdbook-quiz --json assets --jq '.assets[] | select(.name | test("x86_64-unknown-linux-gnu_full.tar.gz$")) | .url')
        curl -sSL "$QUIZ_URL" | tar -xz -C bin
        echo "$PWD/bin" >> $GITHUB_PATH
