name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (reference)
        run: cargo clippy -p mini-claw-code -- -D warnings

      - name: Clippy (starter)
        run: cargo clippy -p mini-claw-code-starter -- -D warnings

      - name: Tests (reference)
        run: cargo test -p mini-claw-code

      - name: Tests (starter — expected to fail until learner fills in stubs)
        run: cargo test -p mini-claw-code-starter || true

      - name: Book test-filter check (fail on zero-match filters)
        run: cargo run -p mini-claw-code-xtask --quiet -- book-filter-check

  book-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook toolchain
        uses: ./.github/actions/install-mdbook

      - name: Build book
        run: mdbook build mini-claw-code-book
