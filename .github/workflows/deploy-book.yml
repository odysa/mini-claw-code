name: Deploy Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook toolchain
        uses: ./.github/actions/install-mdbook

      - name: Build English book
        run: mdbook build mini-claw-code-book

      - name: Build Chinese book
        run: mdbook build mini-claw-code-book-zh

      - name: Combine into single site
        run: |
          mkdir -p mini-claw-code-book/book/zh
          cp -r mini-claw-code-book-zh/book/. mini-claw-code-book/book/zh/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mini-claw-code-book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
