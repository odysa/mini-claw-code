<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <style>
    .f { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .title { fill: #1f1f1d; font-weight: 600; }
    .body { fill: #3d3929; font-weight: 500; }
    .sub { fill: #7a7468; font-weight: 400; }
    .label { fill: #94897a; font-weight: 600; letter-spacing: 0.12em; }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
  </style>

  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1f1f1d" flood-opacity="0.06"/>
    </filter>
    <filter id="soft-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c15f3c" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="llm-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdf6f0"/>
    </linearGradient>

    <marker id="arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#c15f3c"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#9b9689"/>
    </marker>
    <marker id="arr-sage" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b7a4f"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="480" fill="#faf9f5"/>

  <!-- Header -->
  <text x="40" y="44" class="f label" font-size="10">CORE LOOP</text>
  <text x="40" y="66" class="f title" font-size="16">Every coding agent &#8212; yours included &#8212; runs on this.</text>

  <!-- ============ Loop halo (dashed ellipse around LLM + Execute tools) ============ -->
  <ellipse cx="420" cy="270" rx="200" ry="170" fill="none" stroke="#e3dfd1" stroke-width="1.2" stroke-dasharray="4,4"/>
  <rect x="370" y="98" width="108" height="20" rx="10" fill="#faf9f5"/>
  <text x="424" y="112" text-anchor="middle" class="f label" font-size="10">THE AGENT LOOP</text>

  <!-- ============ LLM (top of loop, primary) ============ -->
  <g filter="url(#soft-strong)">
    <rect x="310" y="136" width="220" height="120" rx="16" fill="url(#llm-grad)" stroke="#d97757" stroke-width="1.5"/>
  </g>
  <circle cx="336" cy="166" r="6" fill="#d97757"/>
  <text x="350" y="171" class="f label" font-size="10" fill="#c15f3c">PROVIDER CALL</text>
  <text x="420" y="202" text-anchor="middle" class="f title" font-size="20">LLM</text>
  <text x="420" y="226" text-anchor="middle" class="f mono sub" font-size="11">returns StopReason</text>
  <text x="420" y="244" text-anchor="middle" class="f sub" font-size="11">Stop &#183; ToolUse</text>

  <!-- ============ Execute tools (bottom of loop) ============ -->
  <g filter="url(#soft)">
    <rect x="310" y="298" width="220" height="106" rx="16" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <circle cx="336" cy="328" r="6" fill="#d97757"/>
  <text x="350" y="333" class="f label" font-size="10" fill="#c15f3c">TOOL &#183; USE</text>
  <text x="420" y="366" text-anchor="middle" class="f title" font-size="18">Execute tool calls</text>
  <text x="420" y="388" text-anchor="middle" class="f sub" font-size="11">bash &#183; read &#183; write &#183; edit</text>

  <!-- ============ User prompt (far left, enters loop) ============ -->
  <g filter="url(#soft)">
    <rect x="40" y="176" width="180" height="80" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <circle cx="66" cy="208" r="6" fill="#d97757"/>
  <text x="80" y="213" class="f label" font-size="10">INPUT</text>
  <text x="130" y="236" text-anchor="middle" class="f title" font-size="15">User prompt</text>

  <!-- ============ Return text (far right, exits loop) ============ -->
  <g filter="url(#soft)">
    <rect x="720" y="176" width="200" height="80" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <circle cx="746" cy="208" r="6" fill="#6b7a4f"/>
  <text x="760" y="213" class="f label" font-size="10" fill="#6b7a4f">DONE &#183; EXIT</text>
  <text x="820" y="236" text-anchor="middle" class="f title" font-size="15">Return text to user</text>

  <!-- ============ Entry: User → LLM ============ -->
  <line x1="224" y1="216" x2="306" y2="196" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>
  <rect x="228" y="192" width="68" height="18" rx="9" fill="#faf9f5"/>
  <text x="262" y="205" text-anchor="middle" class="f sub" font-size="11">prompt</text>

  <!-- ============ Exit: LLM → Return text (StopReason::Stop) ============ -->
  <line x1="534" y1="196" x2="716" y2="216" stroke="#6b7a4f" stroke-width="2" marker-end="url(#arr-sage)"/>
  <rect x="560" y="192" width="128" height="18" rx="9" fill="#faf9f5"/>
  <text x="624" y="205" text-anchor="middle" class="f mono sub" font-size="11" fill="#6b7a4f">StopReason::Stop</text>

  <!-- ============ THE LOOP ============ -->
  <!-- Forward curve (right side): LLM bottom-right → Execute tools top-right -->
  <path d="M 498 256 C 580 266, 580 288, 498 298" fill="none" stroke="#c15f3c" stroke-width="2.2" marker-end="url(#arr-accent)"/>
  <rect x="536" y="268" width="108" height="18" rx="9" fill="#faf9f5"/>
  <text x="590" y="281" text-anchor="middle" class="f mono sub" font-size="11" fill="#c15f3c">StopReason::ToolUse</text>

  <!-- Backward curve (left side): Execute tools top-left → LLM bottom-left -->
  <path d="M 342 298 C 260 288, 260 266, 342 256" fill="none" stroke="#9b9689" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arr-muted)"/>
  <rect x="200" y="268" width="132" height="18" rx="9" fill="#faf9f5"/>
  <text x="266" y="281" text-anchor="middle" class="f sub" font-size="11">tool results &#8594; messages</text>

  <!-- Small loop glyph at center of halo -->
  <g transform="translate(420, 278)">
    <path d="M -7 -2 A 7 7 0 1 1 -7 4" fill="none" stroke="#c15f3c" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M -4 -5 L -7 -2 L -4 1" fill="none" stroke="#c15f3c" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 436)">
    <line x1="0" y1="8" x2="28" y2="8" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>
    <text x="38" y="12" class="f sub" font-size="11">call / branch</text>
    <line x1="146" y1="8" x2="174" y2="8" stroke="#9b9689" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arr-muted)"/>
    <text x="184" y="12" class="f sub" font-size="11">feed back into loop</text>
    <line x1="320" y1="8" x2="348" y2="8" stroke="#6b7a4f" stroke-width="2" marker-end="url(#arr-sage)"/>
    <text x="358" y="12" class="f sub" font-size="11">exit loop</text>
  </g>
</svg>
