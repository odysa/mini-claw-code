<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <style>
    .f { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .title { fill: #1f1f1d; font-weight: 600; }
    .body { fill: #3d3929; font-weight: 500; }
    .sub { fill: #7a7468; font-weight: 400; }
    .label { fill: #94897a; font-weight: 600; letter-spacing: 0.12em; }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
  </style>

  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1f1f1d" flood-opacity="0.06"/>
    </filter>
    <filter id="soft-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c15f3c" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="llm-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdf6f0"/>
    </linearGradient>

    <!-- fat arrow markers for the loop itself -->
    <marker id="loop-fwd" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 0 1 L 13 7 L 0 13 z" fill="#c15f3c"/>
    </marker>
    <marker id="loop-back" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 0 1 L 13 7 L 0 13 z" fill="#c15f3c"/>
    </marker>

    <marker id="arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#c15f3c"/>
    </marker>
    <marker id="arr-sage" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b7a4f"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="520" fill="#faf9f5"/>

  <!-- Header -->
  <text x="40" y="44" class="f label" font-size="10">CORE LOOP</text>
  <text x="40" y="66" class="f title" font-size="16">Every coding agent &#8212; yours included &#8212; runs on this.</text>

  <!-- ============ THE LOOP (racetrack around LLM + Execute tools) ============ -->
  <!-- Top arc: LLM → Execute tools (StopReason::ToolUse, forward) -->
  <path d="M 440 220 C 440 88, 720 88, 720 220"
        fill="none" stroke="#c15f3c" stroke-width="3" marker-end="url(#loop-fwd)"/>
  <!-- Bottom arc: Execute tools → LLM (results back, continuing the loop) -->
  <path d="M 720 356 C 720 488, 440 488, 440 356"
        fill="none" stroke="#c15f3c" stroke-width="3" marker-end="url(#loop-back)"/>

  <!-- Labels on the loop arcs -->
  <rect x="478" y="74" width="206" height="22" rx="11" fill="#faf9f5"/>
  <text x="581" y="89" text-anchor="middle" class="f mono body" font-size="12" fill="#c15f3c">StopReason::ToolUse</text>

  <rect x="448" y="476" width="266" height="22" rx="11" fill="#faf9f5"/>
  <text x="581" y="491" text-anchor="middle" class="f sub" font-size="12">feed tool results back as messages</text>

  <!-- Big loop glyph in the center of the racetrack -->
  <g transform="translate(581, 288)" opacity="0.15">
    <circle r="54" fill="none" stroke="#c15f3c" stroke-width="1.2" stroke-dasharray="4,5"/>
  </g>
  <text x="581" y="284" text-anchor="middle" class="f label" font-size="10" fill="#c15f3c" opacity="0.55">AGENT</text>
  <text x="581" y="302" text-anchor="middle" class="f label" font-size="10" fill="#c15f3c" opacity="0.55">LOOP</text>

  <!-- ============ LLM (left of loop, primary) ============ -->
  <g filter="url(#soft-strong)">
    <rect x="340" y="220" width="200" height="136" rx="16" fill="url(#llm-grad)" stroke="#d97757" stroke-width="1.5"/>
  </g>
  <circle cx="366" cy="250" r="6" fill="#d97757"/>
  <text x="380" y="255" class="f label" font-size="10" fill="#c15f3c">PROVIDER CALL</text>
  <text x="440" y="288" text-anchor="middle" class="f title" font-size="22">LLM</text>
  <text x="440" y="314" text-anchor="middle" class="f mono sub" font-size="11">returns StopReason</text>
  <text x="440" y="332" text-anchor="middle" class="f sub" font-size="11">Stop &#183; ToolUse</text>

  <!-- ============ Execute tools (right of loop) ============ -->
  <g filter="url(#soft)">
    <rect x="620" y="220" width="200" height="136" rx="16" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <circle cx="646" cy="250" r="6" fill="#d97757"/>
  <text x="660" y="255" class="f label" font-size="10" fill="#c15f3c">TOOL &#183; USE</text>
  <text x="720" y="290" text-anchor="middle" class="f title" font-size="18">Execute</text>
  <text x="720" y="312" text-anchor="middle" class="f title" font-size="18">tool calls</text>
  <text x="720" y="338" text-anchor="middle" class="f sub" font-size="11">bash &#183; read &#183; write &#183; edit</text>

  <!-- ============ User prompt (far left, enters the loop via LLM) ============ -->
  <g filter="url(#soft)">
    <rect x="40" y="248" width="180" height="80" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <circle cx="66" cy="280" r="6" fill="#d97757"/>
  <text x="80" y="285" class="f label" font-size="10">INPUT</text>
  <text x="130" y="308" text-anchor="middle" class="f title" font-size="15">User prompt</text>

  <!-- User → LLM entry arrow -->
  <line x1="224" y1="288" x2="336" y2="288" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>
  <rect x="234" y="272" width="90" height="18" rx="9" fill="#faf9f5"/>
  <text x="279" y="285" text-anchor="middle" class="f sub" font-size="11">enter the loop</text>

  <!-- ============ Return text (exit from LLM when Stop) ============ -->
  <g filter="url(#soft)">
    <rect x="40" y="400" width="240" height="80" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <circle cx="66" cy="432" r="6" fill="#6b7a4f"/>
  <text x="80" y="437" class="f label" font-size="10" fill="#6b7a4f">DONE &#183; EXIT</text>
  <text x="160" y="460" text-anchor="middle" class="f title" font-size="15">Return text to user</text>

  <!-- LLM → Return text exit arrow (curved down-left, leaves the loop) -->
  <path d="M 360 356 C 330 390, 280 408, 276 408"
        fill="none" stroke="#6b7a4f" stroke-width="2" marker-end="url(#arr-sage)"/>
  <rect x="246" y="370" width="128" height="18" rx="9" fill="#faf9f5"/>
  <text x="310" y="383" text-anchor="middle" class="f mono sub" font-size="11" fill="#6b7a4f">StopReason::Stop</text>

  <!-- Legend -->
  <g transform="translate(720, 448)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#c15f3c" stroke-width="3" marker-end="url(#arr-accent)"/>
    <text x="42" y="12" class="f sub" font-size="11">in the loop</text>
    <line x1="0" y1="28" x2="32" y2="28" stroke="#6b7a4f" stroke-width="2" marker-end="url(#arr-sage)"/>
    <text x="42" y="32" class="f sub" font-size="11">exit the loop</text>
  </g>
</svg>
