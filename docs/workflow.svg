<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <style>
    .f { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .title { fill: #1f1f1d; font-weight: 600; }
    .body { fill: #3d3929; font-weight: 500; }
    .sub { fill: #7a7468; font-weight: 400; }
    .label { fill: #94897a; font-weight: 600; letter-spacing: 0.12em; }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
    .step { fill: #c15f3c; font-weight: 700; letter-spacing: 0.04em; }
  </style>

  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1f1f1d" flood-opacity="0.06"/>
    </filter>
    <marker id="arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#c15f3c"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8aea0"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="320" fill="#faf9f5"/>

  <!-- Header -->
  <text x="40" y="44" class="f label" font-size="10">WORKFLOW</text>
  <text x="40" y="66" class="f title" font-size="16">Every hands-on chapter runs on the same four beats.</text>

  <!-- ============ 4 Step cards ============ -->
  <!-- Card layout: width=200, gap=20, 4 cards = 4*200 + 3*20 = 860 → start x=50 -->
  <!-- x = 50, 270, 490, 710; y = 100, h = 140 -->

  <!-- Step 1: READ -->
  <g filter="url(#soft)">
    <rect x="50" y="100" width="200" height="140" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <rect x="66" y="116" width="34" height="20" rx="10" fill="#f5e8dc"/>
  <text x="83" y="130" text-anchor="middle" class="f step" font-size="10">01</text>
  <!-- book icon -->
  <rect x="66" y="148" width="20" height="22" rx="2" fill="none" stroke="#c15f3c" stroke-width="1.2"/>
  <line x1="76" y1="148" x2="76" y2="170" stroke="#c15f3c" stroke-width="1.2"/>
  <text x="98" y="164" class="f title" font-size="15">Read</text>
  <text x="66" y="194" class="f sub" font-size="12">the chapter</text>
  <text x="66" y="212" class="f sub" font-size="11">tells you which files</text>
  <text x="66" y="226" class="f sub" font-size="11">and tests to run</text>

  <!-- Step 2: OPEN -->
  <g filter="url(#soft)">
    <rect x="270" y="100" width="200" height="140" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <rect x="286" y="116" width="34" height="20" rx="10" fill="#f5e8dc"/>
  <text x="303" y="130" text-anchor="middle" class="f step" font-size="10">02</text>
  <!-- folder icon -->
  <path d="M 286 150 h 8 l 3 3 h 11 v 16 h -22 z" fill="none" stroke="#c15f3c" stroke-width="1.2"/>
  <text x="318" y="164" class="f title" font-size="15">Open</text>
  <text x="286" y="194" class="f sub" font-size="12">the matching file</text>
  <text x="286" y="212" class="f mono sub" font-size="11">starter/src/...</text>
  <text x="286" y="226" class="f sub" font-size="11">in your editor</text>

  <!-- Step 3: REPLACE -->
  <g filter="url(#soft)">
    <rect x="490" y="100" width="200" height="140" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <rect x="506" y="116" width="34" height="20" rx="10" fill="#f5e8dc"/>
  <text x="523" y="130" text-anchor="middle" class="f step" font-size="10">03</text>
  <!-- pencil icon -->
  <path d="M 506 170 l 14 -14 l 5 5 l -14 14 z M 522 154 l 3 -3 l 5 5 l -3 3 z" fill="none" stroke="#c15f3c" stroke-width="1.2"/>
  <text x="538" y="164" class="f title" font-size="15">Replace</text>
  <text x="506" y="194" class="f mono sub" font-size="12">unimplemented!()</text>
  <text x="506" y="212" class="f sub" font-size="11">with your code &#8212; lean</text>
  <text x="506" y="226" class="f sub" font-size="11">on types and errors</text>

  <!-- Step 4: RUN -->
  <g filter="url(#soft)">
    <rect x="710" y="100" width="200" height="140" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1.5" stroke-dasharray="0"/>
  </g>
  <rect x="726" y="116" width="34" height="20" rx="10" fill="#f5e8dc"/>
  <text x="743" y="130" text-anchor="middle" class="f step" font-size="10">04</text>
  <!-- check icon -->
  <path d="M 726 162 l 5 5 l 12 -12" fill="none" stroke="#6b7a4f" stroke-width="1.8" stroke-linecap="round"/>
  <text x="752" y="164" class="f title" font-size="15">Run</text>
  <text x="726" y="194" class="f sub" font-size="12">the test command</text>
  <text x="726" y="212" class="f sub" font-size="11">green = you got it</text>
  <text x="726" y="226" class="f sub" font-size="11">red = reread, repeat</text>

  <!-- ============ Forward arrows between cards ============ -->
  <line x1="254" y1="170" x2="266" y2="170" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>
  <line x1="474" y1="170" x2="486" y2="170" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>
  <line x1="694" y1="170" x2="706" y2="170" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- ============ Feedback loop (red → back to Read) ============ -->
  <path d="M 810 244 C 810 290 150 290 150 244" fill="none" stroke="#b8aea0" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-muted)"/>
  <text x="480" y="286" text-anchor="middle" class="f sub" font-size="11">if the test stays red &#8212; reread, try again</text>
</svg>
