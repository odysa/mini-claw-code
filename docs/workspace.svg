<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400">
  <style>
    .f { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .title { fill: #1f1f1d; font-weight: 600; }
    .body { fill: #3d3929; font-weight: 500; }
    .sub { fill: #7a7468; font-weight: 400; }
    .label { fill: #94897a; font-weight: 600; letter-spacing: 0.12em; }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
  </style>

  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1f1f1d" flood-opacity="0.06"/>
    </filter>
    <filter id="soft-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c15f3c" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="primary-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdf6f0"/>
    </linearGradient>

    <marker id="arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#c15f3c"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8aea0"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="400" fill="#faf9f5"/>

  <!-- Header -->
  <text x="40" y="44" class="f label" font-size="10">WORKSPACE</text>
  <text x="40" y="66" class="f title" font-size="16">One Cargo workspace. Four crates. One of them is yours.</text>

  <!-- Outer workspace container -->
  <rect x="30" y="92" width="900" height="288" rx="18" fill="none" stroke="#d9d6c9" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="52" y="82" width="88" height="20" rx="10" fill="#faf9f5"/>
  <text x="96" y="96" text-anchor="middle" class="f label" font-size="10">CARGO WORKSPACE</text>

  <!-- ============ Top-left: Book ============ -->
  <g filter="url(#soft)">
    <rect x="60" y="120" width="400" height="112" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <!-- book icon -->
  <rect x="82" y="146" width="22" height="28" rx="2" fill="none" stroke="#c15f3c" stroke-width="1.4"/>
  <line x1="93" y1="146" x2="93" y2="174" stroke="#c15f3c" stroke-width="1.2"/>
  <text x="118" y="156" class="f label" font-size="10">TUTORIAL</text>
  <text x="118" y="180" class="f title" font-size="16">mini-claw-code-book</text>
  <text x="82" y="206" class="f sub" font-size="12">18 chapters &#183; mdBook &#183; the source of truth</text>
  <text x="82" y="222" class="f sub" font-size="11">tells you what to build, which files, which tests</text>

  <!-- ============ Top-right: Starter (primary, highlighted) ============ -->
  <g filter="url(#soft-strong)">
    <rect x="500" y="120" width="400" height="112" rx="14" fill="url(#primary-grad)" stroke="#d97757" stroke-width="1.5"/>
  </g>
  <!-- folder + edit icon -->
  <path d="M 520 150 h 10 l 3 3 h 14 v 22 h -27 z" fill="none" stroke="#c15f3c" stroke-width="1.4"/>
  <path d="M 535 168 l 6 -6 l 4 4 l -6 6 z" fill="#c15f3c"/>
  <text x="560" y="156" class="f label" font-size="10" fill="#c15f3c">YOUR CODE &#183; PRIMARY</text>
  <text x="560" y="180" class="f title" font-size="16">mini-claw-code-starter</text>
  <text x="520" y="206" class="f sub" font-size="12">the crate you actually edit &#8212; starts empty</text>
  <text x="520" y="222" class="f mono sub" font-size="11">replace unimplemented!() until tests go green</text>

  <!-- ============ Bottom-left: xtask ============ -->
  <g filter="url(#soft)">
    <rect x="60" y="252" width="400" height="112" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <!-- gear icon -->
  <circle cx="93" cy="292" r="10" fill="none" stroke="#c15f3c" stroke-width="1.4"/>
  <circle cx="93" cy="292" r="3" fill="#c15f3c"/>
  <text x="118" y="282" class="f label" font-size="10">AUTOMATION</text>
  <text x="118" y="306" class="f title" font-size="16">mini-claw-code-xtask</text>
  <text x="82" y="332" class="f sub" font-size="12">build helpers behind every <tspan class="mono">cargo x</tspan> command</text>
  <text x="82" y="348" class="f mono sub" font-size="11">cargo x check &#183; cargo x book &#183; cargo x solution-check</text>

  <!-- ============ Bottom-right: Reference ============ -->
  <g filter="url(#soft)">
    <rect x="500" y="252" width="400" height="112" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1"/>
  </g>
  <!-- check icon -->
  <path d="M 520 290 l 6 6 l 14 -14" fill="none" stroke="#6b7a4f" stroke-width="1.8" stroke-linecap="round"/>
  <text x="560" y="282" class="f label" font-size="10" fill="#6b7a4f">REFERENCE</text>
  <text x="560" y="306" class="f title" font-size="16">mini-claw-code</text>
  <text x="520" y="332" class="f sub" font-size="12">the complete solution &#8212; every test passes</text>
  <text x="520" y="348" class="f sub" font-size="11">peek only when you get stuck, then close the tab</text>

  <!-- ============ Connections ============ -->
  <!-- Book → Starter: "directs you" -->
  <line x1="464" y1="176" x2="496" y2="176" stroke="#c15f3c" stroke-width="2" marker-end="url(#arr-accent)"/>
  <rect x="462" y="164" width="38" height="18" rx="9" fill="#faf9f5"/>
  <text x="481" y="177" text-anchor="middle" class="f sub" font-size="10">read</text>

  <!-- Starter ↕ Reference: "peek when stuck" -->
  <line x1="700" y1="236" x2="700" y2="248" stroke="#9b9689" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>
  <rect x="644" y="230" width="112" height="18" rx="9" fill="#faf9f5"/>
  <text x="700" y="243" text-anchor="middle" class="f sub" font-size="10">peek when stuck</text>

  <!-- xtask → supports all (subtle side link) -->
  <line x1="260" y1="236" x2="260" y2="248" stroke="#b8aea0" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="216" y="230" width="88" height="18" rx="9" fill="#faf9f5"/>
  <text x="260" y="243" text-anchor="middle" class="f sub" font-size="10">supports both</text>
</svg>
