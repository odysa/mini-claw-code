[book]
title = "用 Rust 从零构建你的迷你编程 Agent"
authors = ["mini-claw-code contributors"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.quiz]


[output.html]
additional-js = ["mermaid.min.js", "mermaid-init.js", "language-switcher.js"]
additional-css = ["custom.css"]
site-url = "/mini-claw-code/zh/"
git-repository-url = "https://github.com/odysa/mini-claw-code"
git-repository-icon = "fa-github"
