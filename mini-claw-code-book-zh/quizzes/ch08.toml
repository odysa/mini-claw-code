[[questions]]
type = "MultipleChoice"
prompt.prompt = "为什么 `discover()` 在返回之前对找到的 CLAUDE.md 文件列表进行反转？"
answer.answer = "为了生成根优先的顺序，使全局指令出现在更具体的指令之前——LLM 最后看到最具体的指令，紧靠用户 prompt。"
prompt.distractors = [
  "`Path::parent()` 以相反的顺序返回目录，因此 `reverse()` 撤销了遍历中的一个差一错误。",
  "反转是必需的，因为 `Vec::push` 比 `Vec::insert(0, ...)` 更快，然后再为调用者更正顺序。",
  "这确保最近修改的文件被最先读取，从而提升缓存局部性。",
]
context = """
遍历从工作目录开始并向文件系统根爬升，因此文件被收集为具体优先。反转产生根优先顺序，符合通用规则先于窄范围覆盖的约定。正如本章所述："LLM 最后看到最具体的指令（最靠近用户 prompt）。"前面的推理是组织性的，而非性能相关的。
"""
id = "8d648638-3aa9-45ba-a77b-8259f4aa64ac"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Claude Code 的 `SYSTEM_PROMPT_DYNAMIC_BOUNDARY`——静态与动态部分的分割——其核心动机是什么？"
answer.answer = "prompt 缓存只在稳定前缀上有效；将所有静态内容放在边界以上，使 API 可以在每次请求时复用其缓存的内部状态。"
prompt.distractors = [
  "LLM 拒绝处理超过固定长度的系统 prompt，除非将其分成两半。",
  "动态部分包含必须单独加密的用户特定数据，出于隐私原因。",
  "分割 prompt 使两半能够并行上传，将请求延迟减半。",
]
context = """
缓存命中需要字节完全相同的前缀。如果缓存区域中有任何字符发生变化，缓存就会失效，整个 prompt 必须重新处理。本章的"静态与动态"一节量化了收益：在长 prompt 上最高可降低 85% 的延迟和 90% 的成本。这就是为什么稳定部分（身份、安全规则、工具 schema）放在边界以上，而易变部分（当前工作目录、git 状态、CLAUDE.md 内容）放在边界以下。
"""
id = "612bcca7-4f5e-4816-9478-d383e0225dcd"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "当遍历中没有找到任何 CLAUDE.md 文件时，`InstructionLoader::load()` 返回什么？"
answer.answer = "None"
prompt.distractors = [
  "Some(String::new())",
  "Err(anyhow!(\"no CLAUDE.md found\"))",
  "Some(\"(no instructions)\".to_string())",
]
context = """
`load()` 返回 `Option<String>`，正是为了让调用者能区分"完全没有指令"和"找到了指令"。测试 `test_instructions_instruction_loader_no_files` 锁定了这一点。调用者随后跳过向系统 prompt 追加指令部分，而不是插入一个空块。
"""
id = "7a6172d0-4a5c-44de-ba26-4977be23cbcf"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "为什么 `InstructionLoader::new` 接收 `&[&str]` 但内部存储 `Vec<String>`？"
answer.answer = "为了在 API 边界接受借用数据（对调用者灵活），同时在内部拥有数据（使 struct 没有生命周期参数，且比其创建者存活更长）。"
prompt.distractors = [
  "`&str` 无法用 `serde` 序列化，而 loader 必须序列化其配置。",
  "转换为 `String` 可以规范化路径分隔符，实现跨平台兼容。",
  "`Vec<&str>` 会要求每个 async 方法都有生命周期参数，这与 `#[async_trait]` 冲突。",
]
context = """
本章的"Rust 概念：借用切片到拥有集合"框直接描述了这一模式。接受 `&[&str]` 让调用者可以传入字符串字面量、`&String` 或任何可解引用为 `&str` 的东西——摩擦最小。内部拥有 `Vec<String>` 避免了将 struct 的生命周期与调用者的缓冲区绑定，否则跨任务传递 loader 或将其存储在长生命周期的 agent 中会变得很麻烦。
"""
id = "7c0690e2-4c91-46b7-8a96-e23b25a6c7b6"
